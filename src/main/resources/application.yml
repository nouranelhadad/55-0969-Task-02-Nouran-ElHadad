spring:
  # ── PostgreSQL + JPA ───────────────────────────────────────
  datasource:
    url: jdbc:postgresql://postgres:5432/lab05db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ── MongoDB ────────────────────────────────────────────────
  data:
    mongodb:
      uri: mongodb://root:rootpass@mongo:27017/lab05mongo?authSource=admin

    # ── Redis ──────────────────────────────────────────────────
    redis:
      host: redis
      port: 6379
      password: redispass

  # ── Cassandra ──────────────────────────────────────────────
  cassandra:
    contact-points: cassandra
    port: 9042
    local-datacenter: datacenter1
    keyspace-name: lab05ks
    schema-action: create-if-not-exists
    connection:
      connect-timeout: 20s
      init-query-timeout: 20s
    request:
      timeout: 20s

  # ── Neo4j ──────────────────────────────────────────────────
  neo4j:
    uri: bolt://neo4j:7687
    authentication:
      username: neo4j
      password: neo4jpass

  # ── Elasticsearch ──────────────────────────────────────────
  elasticsearch:
    uris: http://elasticsearch:9200


  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
      - org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration
      - org.springframework.boot.autoconfigure.cassandra.CassandraAutoConfiguration


app:
  description: "Smart E-Commerce Purchase API"

